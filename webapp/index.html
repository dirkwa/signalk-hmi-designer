<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HMI Designer</title>
    <!-- Same icon that ships in the SK appstore tile (webapp/public/icon.svg).
         vite emits this verbatim into public/ and SK mounts the bundle at
         /signalk-hmi-designer/, so the resolved URL works both in `npm run
         dev` and in production. -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <!-- LVGL on the device uses the Montserrat font (14/20/28). Load
         the same family in the designer so widget previews look
         close to what the panel actually renders. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
